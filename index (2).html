<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Game Hub 🎮</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}
header {
  background: #1e293b;
  padding: 15px;
  text-align: center;
}
h1 { margin: 0; }
nav {
  margin-top: 10px;
}
nav input {
  padding: 10px;
  width: 60%;
  border-radius: 8px;
  border: none;
}
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}
.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  transition: 0.2s;
}
.card:hover {
  transform: scale(1.05);
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.card a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #38bdf8;
  color: black;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
}
iframe {
  width: 100%;
  height: 400px;
  border: none;
  border-radius: 10px;
}
footer {
  text-align: center;
  padding: 15px;
  background: #1e293b;
}
</style>
</head>
<body>

<header>
<h1>Ultimate Game Hub 🎮</h1>
<p>Play tons of games in one place!</p>
<nav>
<input type="text" id="search" placeholder="Search games..." onkeyup="searchGames()">
</nav>
</header>

<div class="container" id="games">

<div class="card">
<h3>Subway Surfers</h3>
<iframe src="https://subwaysurfersgame.io/game/subway-surfers/"></iframe>
</div>

<div class="card">
<h3>Slope</h3>
<iframe src="https://slopegame.io/slope-game/"></iframe>
</div>

<div class="card">
<h3>Moto X3M</h3>
<iframe src="https://motox3mgame.net/moto-x3m-1/"></iframe>
</div>

<div class="card">
<h3>Tetris</h3>
<iframe src="https://tetris.com/play-tetris"></iframe>
</div>

<div class="card">
<h3>Snake</h3>
<iframe src="https://playsnake.org/"></iframe>
</div>

<div class="card">
<h3>2048</h3>
<iframe src="https://play2048.co/"></iframe>
</div>

</div>

<footer>
<p>⚠️ Some games may load slowly or be blocked on school WiFi.</p>
</footer>

<script>
function searchGames() {
  let input = document.getElementById('search').value.toLowerCase();
  let cards = document.getElementsByClassName('card');

  for (let i = 0; i < cards.length; i++) {
    let title = cards[i].innerText.toLowerCase();
    cards[i].style.display = title.includes(input) ? "block" : "none";
  }
}
</script>

</body>
</html>
